# ─────────────────────────────────────────────────────────────────────────────
# OutfAI — dev docker-compose
#
# Runs: Next.js web server (Docker) — pinned Node 24
# Does NOT run: Convex dev watcher — must be started locally via:
#                 npm run convex:dev
#               Convex watches your local source files and connects to
#               the Convex cloud; it cannot be containerised.
#
# Usage:
#   docker compose up --build        start (rebuild if Dockerfile/deps changed)
#   docker compose up                start without rebuild
#   docker compose down              stop and remove containers
#   docker compose logs -f web       tail web server logs
#
# GCP Vision API (optional):
#   If you use GOOGLE_APPLICATION_CREDENTIALS, Docker cannot resolve a Windows
#   host path. Copy your key file to .gcp-credentials.json at the project root
#   (it is gitignored) and uncomment the volume + environment lines below.
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount the whole monorepo so edits are reflected immediately.
      - .:/app
      # Anonymous volumes prevent the host node_modules / Next.js cache from
      # masking the ones installed inside the container.
      - /app/node_modules
      - /app/apps/web/.next
    env_file:
      # Docker Compose reads KEY=VALUE lines; comments and blank lines are ignored.
      # The file is optional so the container still starts if it doesn't exist yet.
      - path: .env.local
        required: false
    environment:
      # Always-on in Docker — ensures hot-reload works on Docker Desktop
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"

      # ── Uncomment if using GCP Vision API ─────────────────────────────────
      # 1. Copy your service-account key to .gcp-credentials.json (project root)
      # 2. Uncomment these two blocks:
      #
      # GOOGLE_APPLICATION_CREDENTIALS: /app/.gcp-credentials.json
    # volumes (add under the web service alongside the lines above):
    #   - ./.gcp-credentials.json:/app/.gcp-credentials.json:ro
    restart: unless-stopped
