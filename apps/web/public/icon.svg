<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg   { fill: #0A0A0A; }
    .frame { stroke: #FF4D00; fill: none; stroke-width: 2.5; }
    .accent { stroke: #FF4D00; fill: none; stroke-width: 1.5; }
    .star  { fill: #FF4D00; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #F4F3EF; }
    }
  </style>

  <rect class="bg" width="100" height="100" />

  <!-- Outer square frame — main axis star arms touch its midpoints -->
  <rect class="frame" x="8" y="8" width="84" height="84" />

  <!-- Corner accent lines: from each corner inward to the diagonal star points -->
  <line class="accent" x1="8"  y1="8"  x2="27.4" y2="27.4" />
  <line class="accent" x1="92" y1="8"  x2="72.6" y2="27.4" />
  <line class="accent" x1="92" y1="92" x2="72.6" y2="72.6" />
  <line class="accent" x1="8"  y1="92" x2="27.4" y2="72.6" />

  <!--
    8-pointed compass star (r_long=42, r_short=32, r_inner=7)
    Main axes (N/S/E/W) land exactly on the outer square's midpoints.
    Diagonal axes (NE/SE/SW/NW) land where the corner accent lines end.
  -->
  <path class="star" d="
    M 50,8
    L 52.7,43.5  L 72.6,27.4  L 56.5,47.3
    L 92,50
    L 56.5,52.7  L 72.6,72.6  L 52.7,56.5
    L 50,92
    L 47.3,56.5  L 27.4,72.6  L 43.5,52.7
    L 8,50
    L 43.5,47.3  L 27.4,27.4  L 47.3,43.5
    Z
  " />
</svg>
